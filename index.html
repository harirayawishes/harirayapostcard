<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Hari Raya</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f5132, #198754);
    color: white;
    text-align: center;
}

header {
    padding: 50px 20px;
}

.section {
    background: white;
    color: #333;
    padding: 40px;
    margin: 20px;
    border-radius: 15px;
}

button {
    background: gold;
    border: none;
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
}

/* POPUP */
.popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.popup-content {
    background: white;
    color: black;
    padding: 30px;
    margin: 15% auto;
    width: 80%;
    max-width: 400px;
    border-radius: 15px;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}
</style>
</head>

<body>

<header>
    <h1>🌙 Selamat Hari Raya 🌙</h1>
    <p>Maaf Zahir dan Batin</p>
</header>

<div class="section">
    <h2>Hari Raya Wishes</h2>
    <button onclick="openPopup()">Click for Surprise 🎉</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">&times;</span>
        <h2>🌙 Selamat Hari Raya!</h2>
        <p>Maaf Zahir dan Batin.<br>
        Semoga anda dan keluarga sentiasa bahagia, sihat, dan diberkati! 💚✨</p>
    </div>
</div>

<script>
function openPopup() {
    document.getElementById("popup").style.display = "block";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
